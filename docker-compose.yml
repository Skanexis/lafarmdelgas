name: lafarmdelgas

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lafarmdelgas-backend
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8787
      ADMIN_TOKEN: ${ADMIN_TOKEN:?Set ADMIN_TOKEN in .env}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-500000000}
    volumes:
      - ./server/data:/app/server/data
      - ./server/uploads:/app/server/uploads
    networks:
      - lafarmdelgas
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8787/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
        VITE_ADMIN_PASS: ${ADMIN_TOKEN:?Set ADMIN_TOKEN in .env}
    container_name: lafarmdelgas-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${LAFARM_HOST_PORT:-49173}:80"
    networks:
      - lafarmdelgas

networks:
  lafarmdelgas:
    name: lafarmdelgas-network
